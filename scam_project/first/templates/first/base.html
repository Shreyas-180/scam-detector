{% load crispy_forms_tags %}

<form method="POST">
    {% csrf_token %}
    <fieldset class="form-group">
        <legend class="border-bottom mb-4">
            Enter the {% block page_name %}{% endblock page_name %}
        </legend>
        {{ form|crispy }}
    </fieldset>
    <div class="form-group">
        <button class="btn btn-outline-info" type="Submit">Check</button>
    </div>
</form>

{% if prediction %}
    <div class="mt-3">
        <p><strong>Result:</strong> {{ prediction }}</p>
        <p><strong>Confidence:</strong> {{ confidence|floatformat:2 }}%</p>
    </div>
{% endif %}
